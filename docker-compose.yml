services:
  app:
    # Self-hosting? Skip the local build and pull the published image instead:
    # comment out `build: .` and the `image: paycycle:latest` line below, then
    # uncomment the next line (pin a version, or use :latest).
    #   image: chazwall/paycycle:0.1.0
    build: .
    image: paycycle:latest
    restart: unless-stopped
    ports:
      - "${PAYCYCLE_PORT:-8080}:8080"
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: paycycle
      PGPASSWORD: ${POSTGRES_PASSWORD:-paycycle}
      PGDATABASE: paycycle
      SESSION_SECRET: ${SESSION_SECRET:-}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      TZ: ${TZ:-UTC}
      # Optional: identify a non-production instance in the tab title/sidebar
      INSTANCE_LABEL: ${INSTANCE_LABEL:-}
      INSTANCE_COLOR: ${INSTANCE_COLOR:-}
      # Optional: emailed notifications (in-app notifications work without this)
      APP_URL: ${APP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-PayCycle <paycycle@localhost>}
      # Optional: SimpleFIN bank sync (off unless explicitly enabled)
      BANK_SYNC_ENABLED: ${BANK_SYNC_ENABLED:-false}
      SIMPLEFIN_ALLOW_INSECURE_HOSTS: ${SIMPLEFIN_ALLOW_INSECURE_HOSTS:-false}
      # Optional: OIDC single sign-on (feature hidden without credentials)
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_ISSUER_INTERNAL: ${OIDC_ISSUER_INTERNAL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paycycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paycycle}
      POSTGRES_DB: paycycle
    volumes:
      - paycycle-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycycle -d paycycle"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  paycycle-db:

# --- Robust alternative for passwords with special characters (incl. `$`) ---
# Put the password in ./secrets/pg_password (no trailing newline) and use:
#   app:  environment: { PGPASSWORD_FILE: /run/secrets/pg_password }, secrets: [pg_password]
#   db:   environment: { POSTGRES_PASSWORD_FILE: /run/secrets/pg_password }, secrets: [pg_password]
# secrets:
#   pg_password:
#     file: ./secrets/pg_password
