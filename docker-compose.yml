services:
  app:
    build: .
    image: paycycle:latest
    restart: unless-stopped
    ports:
      - "${PAYCYCLE_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://paycycle:${POSTGRES_PASSWORD:-paycycle}@db:5432/paycycle
      SESSION_SECRET: ${SESSION_SECRET:-}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      TZ: ${TZ:-UTC}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paycycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paycycle}
      POSTGRES_DB: paycycle
    volumes:
      - paycycle-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycycle -d paycycle"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  paycycle-db:
