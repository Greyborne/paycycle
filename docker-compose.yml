services:
  app:
    build: .
    image: paycycle:latest
    restart: unless-stopped
    ports:
      - "${PAYCYCLE_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://paycycle:${POSTGRES_PASSWORD:-paycycle}@db:5432/paycycle
      SESSION_SECRET: ${SESSION_SECRET:-}
      ALLOW_REGISTRATION: ${ALLOW_REGISTRATION:-true}
      DEFAULT_CURRENCY: ${DEFAULT_CURRENCY:-USD}
      TZ: ${TZ:-UTC}
      # Optional: emailed notifications (in-app notifications work without this)
      APP_URL: ${APP_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-PayCycle <paycycle@localhost>}
      # Optional: Plaid bank sync (feature hidden without credentials)
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}
      PLAID_COUNTRY_CODES: ${PLAID_COUNTRY_CODES:-US}
      # Optional: OIDC single sign-on (feature hidden without credentials)
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_ISSUER_INTERNAL: ${OIDC_ISSUER_INTERNAL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-SSO}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paycycle
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paycycle}
      POSTGRES_DB: paycycle
    volumes:
      - paycycle-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paycycle -d paycycle"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  paycycle-db:
