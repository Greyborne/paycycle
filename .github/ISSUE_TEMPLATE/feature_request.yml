name: Feature request / change
description: Suggest an enhancement or a change to existing behavior
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please **search [existing issues](https://github.com/Greyborne/paycycle/issues?q=is%3Aissue)** first — it may already be proposed or on the roadmap (see the README).
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and what's missing or awkward today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen? Sketch the behavior, not necessarily the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one.
    validations:
      required: false
  - type: dropdown
    id: contributing
    attributes:
      label: Are you willing to work on this?
      description: No obligation — this just helps with planning.
      options:
        - "Just suggesting the idea"
        - "I'd like to help, with guidance"
        - "I plan to open a PR"
    validations:
      required: false
