name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install server deps
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build web bundle
        run: |
          cd web
          npm ci
          npm run build
