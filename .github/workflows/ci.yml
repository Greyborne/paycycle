name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paycycle
          POSTGRES_PASSWORD: paycycle
          POSTGRES_DB: paycycle
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U paycycle -d paycycle"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://paycycle:paycycle@localhost:5432/paycycle
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install server deps
        run: npm ci
      - name: Run unit tests
        run: npm test
      - name: Migrate test database
        run: npm run migrate
      - name: Run integration tests
        run: npm run test:integration
      - name: Build web bundle
        run: |
          cd web
          npm ci
          npm run build
