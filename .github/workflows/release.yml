name: Release

# Push a version tag to cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
# This runs the tests, builds the amd64-only image (arm64 is not supported —
# cross-arch emulation in CI hung, so arm64 was dropped as a deliberate
# non-goal, not an oversight), pushes it to Docker Hub (as :<version>,
# :<major>.<minor>, and :latest), syncs the Docker Hub repository
# description from README.md so it can't drift from the repo, and creates
# a GitHub Release. Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo
# secrets.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install server deps
        run: npm ci
      - name: Run tests
        run: npm test

      - uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/paycycle
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sync Docker Hub description from README
        # Keeps the Docker Hub overview from drifting out of sync with the
        # repo (it used to be hand-edited and still mentioned Plaid long
        # after Plaid was removed). Docker Hub caps short-description at
        # 100 chars and full-description (readme) at 25,000 chars; both
        # fit comfortably today. continue-on-error: true because this is
        # cosmetic — the image push and GitHub Release above are what
        # actually matter, and a description-sync hiccup shouldn't fail an
        # otherwise-good release.
        # NOTE: this action's docs state DOCKERHUB_TOKEN must be a
        # password or a Personal Access Token with Read/Write/Delete
        # scope. If DOCKERHUB_TOKEN was created with a narrower scope
        # (e.g. read/write only, for image pushes), this step will fail
        # silently (thanks to continue-on-error) and the description will
        # never update — check the Actions log for this step, and if
        # needed, reissue DOCKERHUB_TOKEN as a Read/Write/Delete token in
        # Docker Hub account settings.
        uses: peter-evans/dockerhub-description@v5
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ secrets.DOCKERHUB_USERNAME }}/paycycle
          short-description: Self-hosted pay-period budgeting with dual balance tracking.
          readme-filepath: ./README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
