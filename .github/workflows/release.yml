name: Release

# Push a version tag to cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
# This runs the tests, builds the multi-arch image (amd64 + arm64), pushes it
# to Docker Hub as :<version> and :latest, and creates a GitHub Release.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install server deps
        run: npm ci
      - name: Run tests
        run: npm test

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/paycycle:${{ steps.ver.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/paycycle:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
