name: Release

# Push a version tag to cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
# This runs the tests, builds the amd64-only image (arm64 is not supported —
# cross-arch emulation in CI hung, so arm64 was dropped as a deliberate
# non-goal, not an oversight), pushes it to Docker Hub (as :<version>,
# :<major>.<minor>, and :latest), and creates a GitHub Release. Requires
# DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repo secrets.

on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the GitHub Release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install server deps
        run: npm ci
      - name: Run tests
        run: npm test

      - uses: docker/setup-buildx-action@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/paycycle
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
